name: tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r tests/requirements-dev.txt
      - name: Run unit tests
        run: pytest
